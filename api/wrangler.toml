# nhimbe API - Cloudflare Workers Configuration
name = "nhimbe-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# Environment variables (use wrangler secret for sensitive values)
[vars]
ENVIRONMENT = "development"

# Development settings
[dev]
port = 8787
local_protocol = "http"

# Workers AI Binding
[ai]
binding = "AI"

# Vectorize Index for RAG Search
[[vectorize]]
binding = "VECTORIZE"
index_name = "nhimbe-events"

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "nhimbe-db"
database_id = "local" # Replace with actual ID after: wrangler d1 create nhimbe-db

# KV Namespace for caching
[[kv_namespaces]]
binding = "CACHE"
id = "local" # Replace with actual ID after: wrangler kv:namespace create CACHE

# Production environment
[env.production]
name = "nhimbe-api"
vars = { ENVIRONMENT = "production" }

# Staging environment
[env.staging]
name = "nhimbe-api-staging"
vars = { ENVIRONMENT = "staging" }
