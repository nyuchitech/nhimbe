# nhimbe API - Cloudflare Workers Configuration
name = "nhimbe-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# Environment variables (use wrangler secret for sensitive values)
[vars]
ENVIRONMENT = "development"

# Development settings
[dev]
port = 8787
local_protocol = "http"

# Production environment
[env.production]
name = "nhimbe-api"
vars = { ENVIRONMENT = "production" }

# Staging environment
[env.staging]
name = "nhimbe-api-staging"
vars = { ENVIRONMENT = "staging" }

# D1 Database (uncomment when ready)
# [[d1_databases]]
# binding = "DB"
# database_name = "nhimbe-db"
# database_id = "<your-database-id>"

# KV Namespace (uncomment when ready)
# [[kv_namespaces]]
# binding = "CACHE"
# id = "<your-kv-id>"
