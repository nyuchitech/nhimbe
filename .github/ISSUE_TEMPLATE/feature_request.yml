name: Feature Request
description: Suggest a new feature for nhimbe
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature. Please describe what you'd like and why it would be useful.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? What's the current pain point?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you've considered.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Events
        - Search & Discovery
        - AI Features
        - Social / Community
        - Payments & Ticketing
        - Notifications
        - Admin / Moderation
        - Accessibility
        - Performance
        - Mobile Experience
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - Nice to have
        - Important
        - Critical -- blocking my use of nhimbe

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, mockups, examples from other platforms, etc.
