name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  worker-typecheck:
    name: Worker Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: worker/package-lock.json

      - name: Install worker dependencies
        run: cd worker && npm ci

      - name: Type check
        run: cd worker && npx tsc --noEmit

  migrations:
    name: Run Migrations
    runs-on: ubuntu-latest
    # Only run on PRs to main, not on push to main
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: worker/package-lock.json

      - name: Install worker dependencies
        run: cd worker && npm ci

      - name: Run migrations (dry run)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd worker

          # List all migration files
          echo "=== Migration files found ==="
          ls -la src/db/migrations/ 2>/dev/null || echo "No migrations directory"

          # Validate SQL syntax by running with --dry-run if available
          # For now, just check that migrations can be parsed
          for file in src/db/migrations/*.sql; do
            if [ -f "$file" ]; then
              echo "Validating: $file"
              # Check file is valid UTF-8 and not empty
              if [ -s "$file" ]; then
                echo "  ✓ File is valid"
              else
                echo "  ✗ File is empty"
                exit 1
              fi
            fi
          done

          echo ""
          echo "=== Migration validation complete ==="

  deploy-migrations:
    name: Deploy Migrations
    runs-on: ubuntu-latest
    # Only run on push to main (after PR merge)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: worker/package-lock.json

      - name: Install worker dependencies
        run: cd worker && npm ci

      - name: Run migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd worker

          # Run each migration file
          for file in src/db/migrations/*.sql; do
            if [ -f "$file" ]; then
              echo "Running migration: $file"
              npx wrangler d1 execute mukoko-nhimbe-db --file="$file" --remote
              echo "  ✓ Completed"
            fi
          done

          echo ""
          echo "=== All migrations applied ==="

  deploy-worker:
    name: Deploy Worker
    runs-on: ubuntu-latest
    needs: [lint-and-build, worker-typecheck, deploy-migrations]
    # Only deploy on push to main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: worker/package-lock.json

      - name: Install worker dependencies
        run: cd worker && npm ci

      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: cd worker && npm run deploy
