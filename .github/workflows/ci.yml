name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: ['**']

permissions:
  contents: read

env:
  NODE_VERSION: '20'

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_STYTCH_PUBLIC_TOKEN: placeholder
          NEXT_PUBLIC_API_URL: https://api.example.com
          NEXT_PUBLIC_SITE_URL: https://example.com

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run

  worker-tests:
    name: Worker Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: worker/package-lock.json

      - name: Install worker dependencies
        run: cd worker && npm ci

      - name: Run worker tests
        run: cd worker && npx vitest run

  worker-typecheck:
    name: Worker Type Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: worker/package-lock.json

      - name: Install worker dependencies
        run: cd worker && npm ci

      - name: Type check
        run: cd worker && npx tsc --noEmit

  validate-migrations:
    name: Validate Migrations
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate migration files
        run: |
          cd worker

          # List all migration files
          echo "=== Migration files found ==="
          ls -la src/db/migrations/ 2>/dev/null || echo "No migrations directory"

          # Validate SQL files exist and are not empty
          for file in src/db/migrations/*.sql; do
            if [ -f "$file" ]; then
              echo "Validating: $file"
              # Check file is valid UTF-8 and not empty
              if [ -s "$file" ]; then
                echo "  ✓ File is valid"
              else
                echo "  ✗ File is empty"
                exit 1
              fi
            fi
          done

          echo ""
          echo "=== Migration validation complete ==="

  # ============================================
  # CODE REVIEW — Claude on pull requests
  # ============================================

  claude-code-review:
    name: Claude Code Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          direct_prompt: |
            Review this PR for:
            1. Security vulnerabilities (XSS, injection, auth bypass, insecure randomness)
            2. Performance issues
            3. Code quality and adherence to project conventions (see CLAUDE.md)
            4. Potential bugs or edge cases
            Be concise. Only flag real issues, not style preferences.

  # ============================================
  # DEPLOYMENT JOBS — only on push to main
  # ============================================

  run-migrations:
    name: Run D1 Migrations
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [lint-and-build, frontend-tests, worker-tests, worker-typecheck, validate-migrations]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: worker/package-lock.json

      - name: Install worker dependencies
        run: cd worker && npm ci

      - name: Run migrations
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # Create migration tracking table if it doesn't exist
          npx wrangler d1 execute mukoko-nhimbe-db --env production --remote --yes \
            --command "CREATE TABLE IF NOT EXISTS _migrations (name TEXT PRIMARY KEY, applied_at TEXT NOT NULL DEFAULT (datetime('now')));"

          # Run each migration in order, skipping already-applied ones
          for file in $(ls src/db/migrations/*.sql | sort); do
            filename=$(basename "$file")
            applied=$(npx wrangler d1 execute mukoko-nhimbe-db --env production --remote --yes \
              --command "SELECT COUNT(*) as c FROM _migrations WHERE name = '$filename';" \
              --json | grep -o '"c":[0-9]*' | grep -o '[0-9]*')

            if [ "$applied" = "1" ]; then
              echo "⏭  Skipping (already applied): $filename"
              continue
            fi

            echo "▶ Running migration: $filename"
            npx wrangler d1 execute mukoko-nhimbe-db --env production --remote --file="$file" --yes
            npx wrangler d1 execute mukoko-nhimbe-db --env production --remote --yes \
              --command "INSERT INTO _migrations (name) VALUES ('$filename');"
            echo "  ✓ Applied: $filename"
          done

          echo ""
          echo "=== All migrations up to date ==="

