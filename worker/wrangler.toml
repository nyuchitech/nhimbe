# nhimbe API - Cloudflare Workers Configuration
# Part of the Mukoko ecosystem
name = "mukoko-nhimbe-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
account_id = "125a2dfbc21f76a25c980609609e8218"

# Environment variables
# Secrets (set via `wrangler secret put`): API_KEY, MONGODB_URI (primary DB)
[vars]
ENVIRONMENT = "development"
ALLOWED_ORIGINS = "http://localhost:3000,http://localhost:3001"
# Stytch project ID — public value, used for local JWT validation via JWKS.
# No Stytch secret needed; auth is handled entirely by the frontend SDK.
STYTCH_PROJECT_ID = "project-live-110e4e1d-725e-4d5b-b519-8fbf5a1c0c9e"

# Development settings
[dev]
port = 8787
local_protocol = "http"

# Observability
[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

# Workers AI Binding
[ai]
binding = "AI"

# Vectorize Index for RAG Search
[[vectorize]]
binding = "VECTORIZE"
index_name = "mukoko-nhimbe-events"

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "mukoko-nhimbe-db"
database_id = "039aa68b-2f13-4c16-9c39-f6ed85283174"

# KV Namespace for caching
[[kv_namespaces]]
binding = "CACHE"
id = "bbe12fb2c88247b4a498da713416b7d7"

# R2 Bucket for media storage
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "mukoko-nhimbe-media"

# Cloudflare Images binding for transformations
[images]
binding = "IMAGES"

# ============================================
# ANALYTICS ENGINE - Real-time analytics
# For tracking views, clicks, conversions
# ============================================
[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "nhimbe_events"

# ============================================
# QUEUES - Background job processing
# For async tasks like email, aggregations
# ============================================
[[queues.producers]]
binding = "ANALYTICS_QUEUE"
queue = "nhimbe-analytics-queue"

[[queues.producers]]
binding = "EMAIL_QUEUE"
queue = "nhimbe-email-queue"

[[queues.consumers]]
queue = "nhimbe-analytics-queue"
max_batch_size = 100
max_batch_timeout = 30

[[queues.consumers]]
queue = "nhimbe-email-queue"
max_batch_size = 10
max_batch_timeout = 60

# ============================================
# HYPERDRIVE - Database connection pooling
# For faster D1 connections (optional)
# ============================================
# [[hyperdrive]]
# binding = "HYPERDRIVE"
# id = "your-hyperdrive-id"

# ============================================
# RATE LIMITING
# Protect API from abuse
# ============================================
[[unsafe.bindings]]
type = "ratelimit"
name = "RATE_LIMITER"
namespace_id = "1"
simple = { limit = 100, period = 60 }  # 100 requests per minute

# ============================================
# PRODUCTION ENVIRONMENT
# Secrets needed (set via `wrangler secret put --env production`):
#   - API_KEY
#   - MONGODB_URI
# ============================================
[env.production]
name = "mukoko-nhimbe-api"
vars = { ENVIRONMENT = "production", ALLOWED_ORIGINS = "https://nhimbe.com,https://www.nhimbe.com,https://mukoko.com,https://www.mukoko.com", STYTCH_PROJECT_ID = "project-live-110e4e1d-725e-4d5b-b519-8fbf5a1c0c9e" }
routes = [
  { pattern = "events-api.mukoko.com", custom_domain = true }
]

[env.production.ai]
binding = "AI"

[[env.production.vectorize]]
binding = "VECTORIZE"
index_name = "mukoko-nhimbe-events"

[[env.production.d1_databases]]
binding = "DB"
database_name = "mukoko-nhimbe-db"
database_id = "039aa68b-2f13-4c16-9c39-f6ed85283174"

[[env.production.kv_namespaces]]
binding = "CACHE"
id = "bbe12fb2c88247b4a498da713416b7d7"

[[env.production.r2_buckets]]
binding = "MEDIA"
bucket_name = "mukoko-nhimbe-media"

[env.production.images]
binding = "IMAGES"

[[env.production.analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "nhimbe_events"

[[env.production.queues.producers]]
binding = "ANALYTICS_QUEUE"
queue = "nhimbe-analytics-queue"

[[env.production.queues.producers]]
binding = "EMAIL_QUEUE"
queue = "nhimbe-email-queue"

[[env.production.queues.consumers]]
queue = "nhimbe-analytics-queue"
max_batch_size = 100
max_batch_timeout = 30

[[env.production.queues.consumers]]
queue = "nhimbe-email-queue"
max_batch_size = 10
max_batch_timeout = 60

# Rate limiting
[[env.production.unsafe.bindings]]
type = "ratelimit"
name = "RATE_LIMITER"
namespace_id = "1"
simple = { limit = 100, period = 60 }

# ============================================
# STAGING ENVIRONMENT
# Secrets needed (set via `wrangler secret put --env staging`):
#   - API_KEY
#   - MONGODB_URI
# ============================================
[env.staging]
name = "mukoko-nhimbe-api-staging"
vars = { ENVIRONMENT = "staging", ALLOWED_ORIGINS = "https://staging.nhimbe.com", STYTCH_PROJECT_ID = "project-test-6add5f68-59c6-4086-88e8-8e0dc819a9a3" }

[env.staging.ai]
binding = "AI"

[[env.staging.vectorize]]
binding = "VECTORIZE"
index_name = "mukoko-nhimbe-events"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "mukoko-nhimbe-db"
database_id = "039aa68b-2f13-4c16-9c39-f6ed85283174"

[[env.staging.kv_namespaces]]
binding = "CACHE"
id = "bbe12fb2c88247b4a498da713416b7d7"

[[env.staging.r2_buckets]]
binding = "MEDIA"
bucket_name = "mukoko-nhimbe-media"

[env.staging.images]
binding = "IMAGES"

[[env.staging.analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "nhimbe_events_staging"

[[env.staging.queues.producers]]
binding = "ANALYTICS_QUEUE"
queue = "nhimbe-analytics-queue"

[[env.staging.queues.producers]]
binding = "EMAIL_QUEUE"
queue = "nhimbe-email-queue"

[[env.staging.queues.consumers]]
queue = "nhimbe-analytics-queue"
max_batch_size = 100
max_batch_timeout = 30

[[env.staging.queues.consumers]]
queue = "nhimbe-email-queue"
max_batch_size = 10
max_batch_timeout = 60

# Rate limiting
[[env.staging.unsafe.bindings]]
