# nhimbe API - Cloudflare Workers Configuration
# Part of the Mukoko ecosystem
name = "mukoko-nhimbe-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# Environment variables (use wrangler secret for sensitive values)
[vars]
ENVIRONMENT = "development"

# Development settings
[dev]
port = 8787
local_protocol = "http"

# Workers AI Binding
[ai]
binding = "AI"

# Vectorize Index for RAG Search
[[vectorize]]
binding = "VECTORIZE"
index_name = "mukoko-nhimbe-events"

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "mukoko-nhimbe-db"
database_id = "039aa68b-2f13-4c16-9c39-f6ed85283174"

# KV Namespace for caching
[[kv_namespaces]]
binding = "CACHE"
id = "bbe12fb2c88247b4a498da713416b7d7"

# R2 Bucket for media storage
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "mukoko-nhimbe-media"

# Cloudflare Images binding for transformations
[images]
binding = "IMAGES"

# Production environment
[env.production]
name = "mukoko-nhimbe-api"
vars = { ENVIRONMENT = "production" }

# Staging environment
[env.staging]
name = "mukoko-nhimbe-api-staging"
vars = { ENVIRONMENT = "staging" }
